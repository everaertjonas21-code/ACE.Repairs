<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACE Car Repair | Klantportaal</title>
  <meta name="description" content="ACE klantportaal voor inloggen, registratie en opvolging van je voertuigstatus." />
  <style>
    :root {
      --panel: #171c22;
      --panel-soft: #1f252d;
      --border: rgba(199, 204, 211, 0.22);
      --text: #f3f6fb;
      --muted: #a6b0bc;
      --accent: #e11919;
      --accent-2: #ff4a4a;
      --radius: 14px;
      --shadow: 0 16px 34px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Montserrat", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0e1115 0%, #141920 45%, #101317 100%);
      color: var(--text);
      line-height: 1.5;
    }
    .container { width: min(1000px, 92%); margin-inline: auto; }
    .top {
      position: sticky; top: 0; z-index: 10;
      background: rgba(13, 16, 20, 0.88); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .top-inner {
      min-height: 74px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    .brand { font-weight: 800; letter-spacing: 0.4px; }
    .back-link {
      color: #ffe3e3; border: 1px solid rgba(225, 25, 25, 0.48);
      background: rgba(225, 25, 25, 0.14); border-radius: 999px; padding: 8px 14px;
      font-weight: 700; text-decoration: none; font-size: 0.85rem;
    }
    .top-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    main { padding: 28px 0 48px; }
    .hero {
      margin-bottom: 20px; background: linear-gradient(130deg, rgba(225, 25, 25, 0.12), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--border); border-radius: var(--radius); padding: 18px;
    }
    .hero h1 { margin: 0 0 8px; font-size: clamp(1.5rem, 4.5vw, 2rem); }
    .hero p { margin: 0; color: var(--muted); }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 18px;
    }
    .tabs { display: inline-flex; gap: 8px; margin-bottom: 12px; }
    .tab-btn {
      border: 1px solid var(--border); background: var(--panel-soft); color: var(--text);
      border-radius: 999px; padding: 10px 14px; font-weight: 700; cursor: pointer;
      min-height: 42px;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      border-color: rgba(225, 25, 25, 0.85);
    }
    form { display: grid; gap: 10px; }
    .field { display: grid; gap: 5px; }
    label { font-size: 0.85rem; color: var(--muted); font-weight: 600; }
    input {
      width: 100%; border: 1px solid var(--border); border-radius: 10px;
      background: rgba(255, 255, 255, 0.02); color: var(--text); padding: 12px 12px; font: inherit;
      min-height: 44px;
    }
    button[type="submit"] {
      border: 0; border-radius: 10px; padding: 12px 14px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%); cursor: pointer;
      min-height: 44px;
    }
    .small { margin-top: 10px; color: var(--muted); font-size: 0.88rem; }
    .hidden { display: none; }
    .lang-switch {
      display: inline-flex;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
      gap: 3px;
    }
    .lang-btn {
      border: 0;
      background: transparent;
      color: #c7ccd3;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.76rem;
      letter-spacing: 0.5px;
      padding: 8px 11px;
      border-radius: 999px;
      cursor: pointer;
    }
    .lang-btn.active { background: var(--accent); color: #fff; }
    @media (max-width: 860px) {
      .brand { width: 100%; }
      .top-controls { width: 100%; justify-content: space-between; }
      .back-link { flex: 1 1 180px; text-align: center; }
      .tabs { width: 100%; display: grid; grid-template-columns: 1fr 1fr; }
      .tab-btn { width: 100%; }
    }
    @media (max-width: 540px) {
      .container { width: min(1000px, 94%); }
      .card, .hero { padding: 14px; }
      .top-inner { min-height: 68px; }
      .lang-switch { width: 100%; justify-content: center; }
      .back-link { width: 100%; }
      .hero h1 { font-size: clamp(1.35rem, 6vw, 1.75rem); }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="container top-inner">
      <div class="brand">ACE Car Repair | Klantportaal</div>
      <div class="top-controls">
        <div class="lang-switch" role="group" aria-label="Language switch">
          <button class="lang-btn active" data-lang="nl" type="button">NL</button>
          <button class="lang-btn" data-lang="en" type="button">EN</button>
          <button class="lang-btn" data-lang="fr" type="button">FR</button>
        </div>
        <a class="back-link" href="index.html" data-i18n="backLink">Terug naar website</a>
      </div>
    </div>
  </header>
  <main>
    <div class="container">
      <section class="hero">
        <h1 data-i18n="heroTitle">Inloggen en naar je dashboard</h1>
        <p data-i18n="heroText">Afspraken op de website blijven zonder account. Dit portaal is apart voor klanten met extra functies.</p>
      </section>
      <div class="grid">
        <section class="card">
          <div class="tabs" role="tablist" aria-label="Portal tabs">
            <button class="tab-btn active" type="button" id="loginTab" aria-selected="true" data-i18n="tabLogin">Login</button>
            <button class="tab-btn" type="button" id="registerTab" aria-selected="false" data-i18n="tabRegister">Register</button>
          </div>
          <form id="loginForm">
            <div class="field"><label for="loginEmail" data-i18n="labelEmail">E-mail</label><input id="loginEmail" name="email" type="email" required /></div>
            <div class="field"><label for="loginPassword" data-i18n="labelPassword">Wachtwoord</label><input id="loginPassword" name="password" type="password" minlength="8" required /></div>
            <button type="submit" data-i18n="btnLogin">Inloggen</button>
          </form>
          <form id="registerForm" class="hidden">
            <div class="field"><label for="regName" data-i18n="labelName">Naam</label><input id="regName" name="name" type="text" required /></div>
            <div class="field"><label for="regEmail" data-i18n="labelEmail">E-mail</label><input id="regEmail" name="email" type="email" required /></div>
            <div class="field"><label for="regPassword" data-i18n="labelPassword">Wachtwoord</label><input id="regPassword" name="password" type="password" minlength="8" required /></div>
            <button type="submit" data-i18n="btnRegister">Account aanmaken</button>
          </form>
          <p class="small" id="authMessage" data-i18n="authHint">Gebruik je e-mail en wachtwoord om in te loggen of registreer in enkele seconden.</p>
        </section>
      </div>
    </div>
  </main>
  <script>
    const portalApiUrl = 'https://script.google.com/macros/s/AKfycbyVkiMyZjVEkZd9tSIcbvNI7AwlFnkaNlQ0g3L2yuBNdlEaV8-L8X1wXCIkqlZWve33cg/exec';
    const dashboardCacheKey = 'ace_dashboard_cache_v1';
    const existingToken = localStorage.getItem('ace_portal_token') || '';
    if (existingToken) {
      window.location.href = 'dashboard.html';
    }
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const authMessage = document.getElementById('authMessage');
    const translations = {
      nl: {
        pageTitle: 'ACE Car Repair | Klantportaal',
        backLink: 'Terug naar website',
        heroTitle: 'Inloggen en naar je dashboard',
        heroText: 'Afspraken op de website blijven zonder account. Dit portaal is apart voor klanten met extra functies.',
        tabLogin: 'Login',
        tabRegister: 'Register',
        labelName: 'Naam',
        labelEmail: 'E-mail',
        labelPassword: 'Wachtwoord',
        btnLogin: 'Inloggen',
        btnRegister: 'Account aanmaken',
        authHint: 'Gebruik je e-mail en wachtwoord om in te loggen of registreer in enkele seconden.',
        msgLoggingIn: 'Inloggen...',
        msgLoginOk: 'Login gelukt.',
        msgRegistering: 'Account wordt aangemaakt...',
        msgRegisterOk: 'Registratie gelukt.',
        msgConnectFail: 'Verbinding mislukt.',
        msgLoginFail: 'Login mislukt.',
        msgRegisterFail: 'Registratie mislukt.'
      },
      en: {
        pageTitle: 'ACE Car Repair | Customer Portal',
        backLink: 'Back to website',
        heroTitle: 'Log in to your dashboard',
        heroText: 'Appointments on the website stay guest-friendly. This portal is separate for customers with extra features.',
        tabLogin: 'Login',
        tabRegister: 'Register',
        labelName: 'Name',
        labelEmail: 'Email',
        labelPassword: 'Password',
        btnLogin: 'Login',
        btnRegister: 'Create account',
        authHint: 'Use your email and password to log in or register in seconds.',
        msgLoggingIn: 'Logging in...',
        msgLoginOk: 'Login successful.',
        msgRegistering: 'Creating account...',
        msgRegisterOk: 'Registration successful.',
        msgConnectFail: 'Connection failed.',
        msgLoginFail: 'Login failed.',
        msgRegisterFail: 'Registration failed.'
      },
      fr: {
        pageTitle: 'ACE Car Repair | Portail Client',
        backLink: 'Retour au site',
        heroTitle: 'Connectez-vous à votre tableau de bord',
        heroText: 'Les rendez-vous sur le site restent sans compte. Ce portail est séparé pour les clients avec des fonctions en plus.',
        tabLogin: 'Connexion',
        tabRegister: 'Inscription',
        labelName: 'Nom',
        labelEmail: 'E-mail',
        labelPassword: 'Mot de passe',
        btnLogin: 'Se connecter',
        btnRegister: 'Créer un compte',
        authHint: 'Utilisez votre e-mail et mot de passe pour vous connecter ou vous inscrire en quelques secondes.',
        msgLoggingIn: 'Connexion...',
        msgLoginOk: 'Connexion réussie.',
        msgRegistering: 'Création du compte...',
        msgRegisterOk: 'Inscription réussie.',
        msgConnectFail: 'Échec de connexion.',
        msgLoginFail: 'Connexion échouée.',
        msgRegisterFail: 'Inscription échouée.'
      }
    };
    let currentLang = localStorage.getItem('ace_lang') || 'nl';

    const setLanguage = (lang) => {
      currentLang = translations[lang] ? lang : 'nl';
      localStorage.setItem('ace_lang', currentLang);
      const dict = translations[currentLang];
      document.documentElement.lang = currentLang;
      document.title = dict.pageTitle;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.dataset.i18n;
        if (dict[key]) el.textContent = dict[key];
      });
      document.querySelectorAll('.lang-btn').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
    };

    const setMessage = (text, isError) => {
      authMessage.textContent = text;
      authMessage.style.color = isError ? '#ff9f9f' : '#a6b0bc';
    };

    const setBusy = (form, busy) => {
      const btn = form.querySelector('button[type="submit"]');
      if (btn) btn.disabled = busy;
    };

    const collectClientInfo = () => ({
      user_agent: navigator.userAgent || '',
      language: navigator.language || '',
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || ''
    });

    const postAuth = async (payload) => {
      const response = await fetch(portalApiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data?.ok !== true) {
        throw new Error(data?.error || (translations[currentLang] || translations.nl).msgConnectFail);
      }
      return data;
    };
    document.querySelectorAll('.lang-btn').forEach((btn) => {
      btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });
    setLanguage(currentLang);
    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active'); registerTab.classList.remove('active');
      loginTab.setAttribute('aria-selected', 'true'); registerTab.setAttribute('aria-selected', 'false');
      loginForm.classList.remove('hidden'); registerForm.classList.add('hidden');
    });
    registerTab.addEventListener('click', () => {
      registerTab.classList.add('active'); loginTab.classList.remove('active');
      registerTab.setAttribute('aria-selected', 'true'); loginTab.setAttribute('aria-selected', 'false');
      registerForm.classList.remove('hidden'); loginForm.classList.add('hidden');
    });
    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const data = new FormData(loginForm);
      const payload = {
        action: 'login',
        email: String(data.get('email') || '').trim(),
        password: String(data.get('password') || ''),
        client_info: collectClientInfo()
      };
      setBusy(loginForm, true);
      setMessage((translations[currentLang] || translations.nl).msgLoggingIn, false);
      postAuth(payload)
        .then((res) => {
          localStorage.setItem('ace_portal_token', String(res.token || ''));
          localStorage.setItem('ace_portal_user', JSON.stringify(res.user || {}));
          if (res.dashboard_snapshot && res.dashboard_snapshot.ok) {
            localStorage.setItem(dashboardCacheKey, JSON.stringify(res.dashboard_snapshot));
          }
          setMessage((translations[currentLang] || translations.nl).msgLoginOk, false);
          loginForm.reset();
          window.location.href = 'dashboard.html';
        })
        .catch((err) => {
          setMessage(err.message || (translations[currentLang] || translations.nl).msgLoginFail, true);
        })
        .finally(() => setBusy(loginForm, false));
    });

    registerForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const data = new FormData(registerForm);
      const payload = {
        action: 'register',
        name: String(data.get('name') || '').trim(),
        email: String(data.get('email') || '').trim(),
        password: String(data.get('password') || ''),
        client_info: collectClientInfo()
      };
      setBusy(registerForm, true);
      setMessage((translations[currentLang] || translations.nl).msgRegistering, false);
      postAuth(payload)
        .then((res) => {
          localStorage.setItem('ace_portal_token', String(res.token || ''));
          localStorage.setItem('ace_portal_user', JSON.stringify(res.user || {}));
          if (res.dashboard_snapshot && res.dashboard_snapshot.ok) {
            localStorage.setItem(dashboardCacheKey, JSON.stringify(res.dashboard_snapshot));
          }
          setMessage((translations[currentLang] || translations.nl).msgRegisterOk, false);
          registerForm.reset();
          window.location.href = 'dashboard.html';
        })
        .catch((err) => {
          setMessage(err.message || (translations[currentLang] || translations.nl).msgRegisterFail, true);
        })
        .finally(() => setBusy(registerForm, false));
    });
  </script>
</body>
</html>
