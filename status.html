<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACE Car Repair | Live Status</title>
  <meta name="description" content="Realtime repair progress tracker for your vehicle." />
  <style>
    :root {
      --bg: #101317;
      --panel: #171c22;
      --panel-soft: #1f252d;
      --border: rgba(199, 204, 211, 0.22);
      --text: #f3f6fb;
      --muted: #a6b0bc;
      --accent: #e11919;
      --radius: 14px;
      --shadow: 0 16px 34px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Montserrat", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0e1115 0%, #141920 45%, #101317 100%);
      color: var(--text);
    }
    .container { width: min(1100px, 92%); margin-inline: auto; }
    .top { position: sticky; top: 0; z-index: 10; background: rgba(13, 16, 20, 0.88); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
    .top-inner { min-height: 74px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .brand { font-weight: 800; letter-spacing: 0.4px; }
    .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn { border: 1px solid var(--border); border-radius: 999px; padding: 10px 12px; color: var(--text); background: var(--panel-soft); font-weight: 700; cursor: pointer; text-decoration: none; font-size: 0.84rem; min-height: 42px; }
    .lang-switch { display: inline-flex; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border); border-radius: 999px; padding: 3px; gap: 3px; }
    .lang-btn { border: 0; background: transparent; color: #c7ccd3; font-family: inherit; font-weight: 700; font-size: 0.76rem; letter-spacing: 0.5px; padding: 8px 11px; border-radius: 999px; cursor: pointer; }
    .lang-btn.active { background: var(--accent); color: #fff; }
    main { padding: 24px 0 40px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
    .card h2 { margin: 0 0 12px; font-size: 1.1rem; }
    .tracker-wrap { overflow-x: auto; padding-bottom: 4px; }
    .tracker-row { min-width: 760px; display: flex; align-items: center; gap: 8px; }
    .tracker-step { flex: 1; min-width: 130px; text-align: center; }
    .tracker-dot { width: 42px; height: 42px; border-radius: 999px; border: 2px solid #94a3b8; color: #64748b; background: #e2e8f0; margin: 0 auto; display: grid; place-items: center; transition: all 0.25s ease; }
    .tracker-label { margin-top: 7px; font-size: 0.78rem; color: #94a3b8; font-weight: 600; }
    .tracker-line { height: 4px; flex: 1; border-radius: 999px; background: #334155; min-width: 26px; }
    .tracker-step.completed .tracker-dot { border-color: #16a34a; background: #dcfce7; color: #15803d; }
    .tracker-step.completed .tracker-label { color: #4ade80; }
    .tracker-step.active .tracker-dot { border-color: #3b82f6; background: #dbeafe; color: #2563eb; animation: trackerPulse 1.4s infinite ease-in-out; }
    .tracker-step.active .tracker-label { color: #93c5fd; }
    .tracker-line.completed { background: #22c55e; }
    .live-update { margin-top: 12px; border: 1px solid rgba(148, 163, 184, 0.35); border-radius: 12px; background: rgba(15, 23, 42, 0.65); padding: 10px 12px; }
    .live-update h3 { margin: 0 0 6px; font-size: 0.95rem; }
    .live-update p { margin: 0; color: #d5deea; font-size: 0.9rem; line-height: 1.5; }
    .live-update .ts { margin-top: 6px; color: #8ea0b7; font-size: 0.76rem; }
    .meta { margin-top: 10px; color: var(--muted); font-size: 0.9rem; }
    @keyframes trackerPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.45); }
      50% { transform: scale(1.04); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
    }
    @media (max-width: 760px) {
      .brand { width: 100%; }
      .actions { width: 100%; justify-content: space-between; }
      .lang-switch { width: 100%; justify-content: center; }
      .btn { flex: 1 1 140px; text-align: center; }
    }
    @media (max-width: 540px) {
      .container { width: min(1100px, 94%); }
      .card { padding: 13px; }
      .actions { gap: 6px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="container top-inner">
      <div class="brand">ACE Car Repair | Live Status</div>
      <div class="actions">
        <div class="lang-switch" role="group" aria-label="Language switch">
          <button class="lang-btn active" data-lang="nl" type="button">NL</button>
          <button class="lang-btn" data-lang="en" type="button">EN</button>
          <button class="lang-btn" data-lang="fr" type="button">FR</button>
        </div>
        <a class="btn" href="dashboard.html" data-i18n="backDashboard">Dashboard</a>
        <a class="btn" href="index.html" data-i18n="websiteBtn">Website</a>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="card">
        <h2 data-i18n="title">Repair Progress Tracker</h2>
        <div class="tracker-wrap"><div class="tracker-row" id="repairTracker"></div></div>
        <div class="live-update">
          <h3 data-i18n="liveUpdateTitle">Live Update</h3>
          <p id="liveUpdateMessage"></p>
          <div class="ts" id="liveUpdateTs"></div>
        </div>
        <div class="meta" id="statusMeta"></div>
      </section>
    </div>
  </main>

  <script>
    const portalApiUrl = 'https://script.google.com/macros/s/AKfycbyVkiMyZjVEkZd9tSIcbvNI7AwlFnkaNlQ0g3L2yuBNdlEaV8-L8X1wXCIkqlZWve33cg/exec';
    const token = localStorage.getItem('ace_portal_token') || '';
    if (!token) window.location.href = 'account.html';

    const trackerCacheKey = 'ace_live_status_cache_v1';
    const repairTracker = document.getElementById('repairTracker');
    const liveUpdateMessage = document.getElementById('liveUpdateMessage');
    const liveUpdateTs = document.getElementById('liveUpdateTs');
    const statusMeta = document.getElementById('statusMeta');
    const STAGES = [
      { key: 'appointment_confirmed', icon: 'check' },
      { key: 'diagnostic', icon: 'search' },
      { key: 'in_repair', icon: 'wrench' },
      { key: 'quality_check', icon: 'shield' },
      { key: 'ready_for_pickup', icon: 'car' }
    ];
    let stageKeys = STAGES.map((s) => s.key);
    let remoteStatusI18n = null;

    const translations = {
      nl: { pageTitle: 'ACE Car Repair | Live Status', backDashboard: 'Dashboard', websiteBtn: 'Website', title: 'Repair Progress Tracker', liveUpdateTitle: 'Live Update', no_appointment: 'Geen afspraak ingepland', no_appointment_msg: 'Er is nog geen actieve afspraak ingepland.', appointment_confirmed: 'Afspraak bevestigd', diagnostic: 'Diagnose', in_repair: 'In herstelling', quality_check: 'Kwaliteitscontrole', ready_for_pickup: 'Klaar voor ophaling', appointment_confirmed_msg: 'Je afspraak is bevestigd. We staan klaar om je wagen te ontvangen.', diagnostic_msg: 'Onze technieker voert momenteel een gerichte diagnose uit.', in_repair_msg: 'Onze technieker is je wagen nauwkeurig aan het herstellen. Alles loopt op schema.', quality_check_msg: 'Je wagen zit in kwaliteitscontrole voor finale vrijgave.', ready_for_pickup_msg: 'Goed nieuws: je wagen is klaar voor ophaling.', noData: 'Nog geen repair status gevonden.', dateLabel: 'Datum', time: 'Laatste update', meta: '{service} | {vehicle} | {dateLabel}: {date}' },
      en: { pageTitle: 'ACE Car Repair | Live Status', backDashboard: 'Dashboard', websiteBtn: 'Website', title: 'Repair Progress Tracker', liveUpdateTitle: 'Live Update', no_appointment: 'No appointment scheduled', no_appointment_msg: 'There is no active appointment scheduled yet.', appointment_confirmed: 'Appointment confirmed', diagnostic: 'Diagnostic', in_repair: 'In repair', quality_check: 'Quality check', ready_for_pickup: 'Ready for pickup', appointment_confirmed_msg: 'Your appointment is confirmed. We are ready to receive your car.', diagnostic_msg: 'Our technician is currently running a focused diagnostic.', in_repair_msg: 'Our technician is carefully repairing your vehicle. Everything is on schedule.', quality_check_msg: 'Your vehicle is in final quality control before release.', ready_for_pickup_msg: 'Great news: your vehicle is ready for pickup.', noData: 'No repair status found yet.', dateLabel: 'Date', time: 'Last update', meta: '{service} | {vehicle} | {dateLabel}: {date}' },
      fr: { pageTitle: 'ACE Car Repair | Live Status', backDashboard: 'Dashboard', websiteBtn: 'Site', title: 'Repair Progress Tracker', liveUpdateTitle: 'Live Update', no_appointment: 'Aucun rendez-vous planifie', no_appointment_msg: 'Aucun rendez-vous actif n est planifie pour le moment.', appointment_confirmed: 'Rendez-vous confirme', diagnostic: 'Diagnostic', in_repair: 'En reparation', quality_check: 'Controle qualite', ready_for_pickup: 'Pret pour retrait', appointment_confirmed_msg: 'Votre rendez-vous est confirme. Nous sommes prets a recevoir votre vehicule.', diagnostic_msg: 'Notre technicien effectue actuellement un diagnostic precis.', in_repair_msg: 'Notre technicien repare votre vehicule avec precision. Nous sommes dans les delais.', quality_check_msg: 'Votre vehicule est en controle qualite final avant remise.', ready_for_pickup_msg: 'Bonne nouvelle: votre vehicule est pret pour le retrait.', noData: 'Aucun statut trouve pour le moment.', dateLabel: 'Date', time: 'Derniere mise a jour', meta: '{service} | {vehicle} | {dateLabel}: {date}' }
    };
    let currentLang = localStorage.getItem('ace_lang') || 'nl';
    let pollTimer = null;
    let pollDelayMs = 30000;
    let pollFailures = 0;
    let dashboardContext = null;

    const t = (key) => {
      const p = translations[currentLang] || {};
      if (Object.prototype.hasOwnProperty.call(p, key)) return p[key];
      return (translations.nl || {})[key] || key;
    };
    const statusLabel = (statusKey) => {
      const remote = (remoteStatusI18n && remoteStatusI18n[currentLang]) || {};
      return remote[`status_${statusKey}`] || t(statusKey);
    };
    const statusMessage = (statusKey) => {
      const remote = (remoteStatusI18n && remoteStatusI18n[currentLang]) || {};
      return remote[`msg_${statusKey}`] || t(`${statusKey}_msg`);
    };
    const statusDateLabel = () => ((remoteStatusI18n && remoteStatusI18n[currentLang] && remoteStatusI18n[currentLang].date_label) || t('dateLabel'));
    const statusTimeLabel = () => ((remoteStatusI18n && remoteStatusI18n[currentLang] && remoteStatusI18n[currentLang].time_label) || t('time'));

    const formatDate = (value) => {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value || '-');
      const locale = currentLang === 'fr' ? 'fr-BE' : (currentLang === 'en' ? 'en-GB' : 'nl-BE');
      return new Intl.DateTimeFormat(locale, { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).format(d);
    };
    const applyLanguage = (lang) => {
      currentLang = translations[lang] ? lang : 'nl';
      localStorage.setItem('ace_lang', currentLang);
      document.documentElement.lang = currentLang;
      document.title = t('pageTitle');
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const value = t(el.dataset.i18n);
        if (value) el.textContent = value;
      });
      document.querySelectorAll('.lang-btn').forEach((btn) => btn.classList.toggle('active', btn.dataset.lang === currentLang));
      if (dashboardContext?.status) renderTracker(dashboardContext.status, dashboardContext.timestamp || '');
    };
    document.querySelectorAll('.lang-btn').forEach((btn) => btn.addEventListener('click', () => applyLanguage(btn.dataset.lang)));

    const iconSvg = (kind) => {
      if (kind === 'check') return '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>';
      if (kind === 'search') return '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>';
      if (kind === 'wrench') return '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a5 5 0 0 0-6.4 6.4L3 18l3 3 5.3-5.3a5 5 0 0 0 6.4-6.4l-3 3-2-2 2-2z"/></svg>';
      if (kind === 'shield') return '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l7 3v6c0 5-3.5 8-7 9-3.5-1-7-4-7-9V6l7-3z"/><path d="M9 12l2 2 4-4"/></svg>';
      return '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M7 16h2"/><path d="M15 16h2"/><path d="M6 12l1-4h10l1 4"/></svg>';
    };
    const renderTracker = (statusKey, timestamp) => {
      const normalizedStatus = stageKeys.includes(statusKey) ? statusKey : 'no_appointment';
      const idx = STAGES.findIndex((s) => s.key === normalizedStatus);
      const active = idx >= 0 ? idx : -1;
      const parts = [];
      STAGES.forEach((stage, i) => {
        const state = active < 0 ? 'future' : (i < active ? 'completed' : (i === active ? 'active' : 'future'));
        parts.push(`<div class="tracker-step ${state}"><div class="tracker-dot">${iconSvg(stage.icon)}</div><div class="tracker-label">${statusLabel(stage.key)}</div></div>`);
        if (i < STAGES.length - 1) parts.push(`<div class="tracker-line ${(active >= 0 && i < active) ? 'completed' : ''}"></div>`);
      });
      repairTracker.innerHTML = parts.join('');
      liveUpdateMessage.textContent = statusMessage(normalizedStatus);
      liveUpdateTs.textContent = timestamp ? `${statusTimeLabel()}: ${formatDate(timestamp)}` : '';
    };

    const fetchI18n = async () => {
      const response = await fetch(`${portalApiUrl}?action=i18n`, { cache: 'no-store' });
      const data = await response.json().catch(() => ({}));
      if (response.ok && data?.ok && data.status_i18n) {
        remoteStatusI18n = data.status_i18n;
        if (Array.isArray(data.status_keys) && data.status_keys.length) {
          stageKeys = data.status_keys.filter((k) => k !== 'no_appointment');
        }
      }
    };
    const fetchDashboard = async () => {
      const response = await fetch(portalApiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'dashboard', token })
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data?.ok !== true) throw new Error(data?.error || 'Dashboard load failed');
      return data;
    };
    const fetchRepairStatus = async (email, jobId) => {
      const q = new URLSearchParams({ action: 'repair_status' });
      if (jobId) q.set('job_id', jobId);
      if (email) q.set('email', email);
      const response = await fetch(`${portalApiUrl}?${q.toString()}`, { cache: 'no-store' });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data?.ok !== true) throw new Error(data?.error || t('noData'));
      return data;
    };

    const stopPolling = () => { if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; } };
    const scheduleNextPoll = (run) => { stopPolling(); pollTimer = setTimeout(run, pollDelayMs); };
    const startPolling = (email, jobId, fallbackStatus) => {
      const run = () => {
        if (document.hidden) { scheduleNextPoll(run); return; }
        fetchRepairStatus(email, jobId)
          .then((data) => {
            const normalized = String(data.currentStatus || fallbackStatus || 'no_appointment');
            dashboardContext = { ...(dashboardContext || {}), status: normalized, timestamp: data.timestamp || '' };
            localStorage.setItem(trackerCacheKey, JSON.stringify(dashboardContext));
            renderTracker(normalized, data.timestamp || '');
            pollFailures = 0;
            pollDelayMs = 30000;
          })
          .catch(() => {
            pollFailures = Math.min(5, pollFailures + 1);
            pollDelayMs = Math.min(120000, 30000 * Math.pow(2, pollFailures));
            if (dashboardContext?.status) renderTracker(dashboardContext.status, dashboardContext.timestamp || '');
          })
          .finally(() => scheduleNextPoll(run));
      };
      pollFailures = 0;
      pollDelayMs = 30000;
      stopPolling();
      run();
    };

    applyLanguage(currentLang);
    fetchI18n().then(() => { if (dashboardContext?.status) renderTracker(dashboardContext.status, dashboardContext.timestamp || ''); }).catch(() => {});

    try {
      const cached = JSON.parse(localStorage.getItem(trackerCacheKey) || '{}');
      if (cached && cached.status) {
        dashboardContext = cached;
        renderTracker(cached.status, cached.timestamp || '');
      } else {
        renderTracker('no_appointment', '');
      }
    } catch (_err) {
      renderTracker('no_appointment', '');
    }

    fetchDashboard()
      .then((dash) => {
        const active = dash.active_car_status || null;
        const mapAppointmentStatus = (raw) => {
          const s = String(raw || '').toUpperCase();
          if (s === 'COMPLETED') return 'ready_for_pickup';
          if (s === 'PENDING' || s === 'CONFIRMED' || s === 'IN_PROGRESS') return 'appointment_confirmed';
          return 'no_appointment';
        };
        const fallback = active ? mapAppointmentStatus(active.status) : 'no_appointment';
        statusMeta.textContent = active ? t('meta')
          .replace('{service}', active.service || '-')
          .replace('{vehicle}', active.vehicle || '-')
          .replace('{dateLabel}', statusDateLabel())
          .replace('{date}', active.preferred_date || '-') : '';
        if (!active) {
          dashboardContext = { status: 'no_appointment', timestamp: '' };
          renderTracker('no_appointment', '');
          return;
        }
        dashboardContext = { status: fallback, timestamp: '' };
        renderTracker(fallback, '');
        startPolling(dash.user?.email || '', active?.id || '', fallback);
      })
      .catch(() => {
        statusMeta.textContent = t('noData');
        dashboardContext = { status: 'no_appointment', timestamp: '' };
        renderTracker('no_appointment', '');
      });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && dashboardContext) pollDelayMs = 2000;
    });
    window.addEventListener('beforeunload', stopPolling);
  </script>
</body>
</html>
